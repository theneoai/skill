name: Daily Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: builder/package.json
    
    - name: Install dependencies
      run: |
        cd builder
        npm ci
    
    - name: Run npm audit
      run: |
        cd builder
        npm audit --audit-level moderate
      continue-on-error: true
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified
    
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  cwe-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate CWE patterns
      run: |
        # Check that all CWE patterns are valid
        cd core/shared/security
        python3 -c "
import yaml
with open('cwe-patterns.yaml', 'r') as f:
    data = yaml.safe_load(f)
    print(f'Loaded {len(data.get(\"patterns\", []))} CWE patterns')
    for pattern in data.get('patterns', []):
        assert 'id' in pattern, 'Pattern missing ID'
        assert 'name' in pattern, f'Pattern {pattern.get(\"id\", \"unknown\")} missing name'
        assert 'regex' in pattern, f'Pattern {pattern.get(\"id\", \"unknown\")} missing regex'
    print('All CWE patterns valid ✓')
"
      continue-on-error: true
