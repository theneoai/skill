# CWE Security Patterns for Skill Validation
# Simplified version for testing

scan_on_delivery: true
standard: CWE

severity_levels:
  p0:
    name: CRITICAL
    action: ABORT
    description: Must fix before delivery
  p1:
    name: WARNING
    action: SCORE_PENALTY
    penalty: -10
    description: Should fix, score penalty

patterns:
  - id: cwe-798
    name: Hardcoded Credentials
    severity: P0
    regex_simple: "password\\s*=\\s*\"[^\"]+\""
    description: Detects hardcoded passwords
    
  - id: cwe-89
    name: SQL Injection
    severity: P0
    regex_simple: "SELECT.*\\+.*\\$"
    description: Detects SQL injection patterns
    
  - id: cwe-78
    name: Command Injection
    severity: P0
    regex_simple: "exec\\s*\\("
    description: Detects command injection
    
  - id: cwe-22
    name: Path Traversal
    severity: P1
    regex_simple: "\\.\\./"
    description: Detects path traversal attempts

report_format: |
  Security Scan Report
  ====================
  P0: {{p0_count}} violations
  P1: {{p1_count}} violations
