# Evaluation Rubrics for Skill Certification
# Complete 1000-point scoring system

# ============================================================================
# PHASE 1: PARSE & VALIDATE (100 points)
# Validates YAML syntax, structure, and metadata completeness
# ============================================================================
phase_1_parse_validate:
  total_points: 100
  description: "Validate YAML syntax, structure, and required metadata"
  
  checks:
    - id: yaml_syntax_valid
      name: "YAML Syntax Valid"
      points: 10
      description: "YAML parses without syntax errors"
      criteria: "File loads successfully with yaml.safe_load()"
      
    - id: required_fields_present
      name: "Required Fields Present"
      points: 10
      description: "All mandatory top-level fields exist"
      criteria: "Contains: name, description, version, author, commands"
      
    - id: name_format_valid
      name: "Name Format Valid"
      points: 8
      description: "Skill name follows naming conventions"
      criteria: "Lowercase, alphanumeric with hyphens/underscores, 3-50 chars"
      
    - id: description_present
      name: "Description Present"
      points: 8
      description: "Description field is non-empty and meaningful"
      criteria: "Minimum 10 characters, describes purpose"
      
    - id: version_semantic
      name: "Semantic Versioning"
      points: 8
      description: "Version follows semantic versioning (MAJOR.MINOR.PATCH)"
      criteria: "Format: X.Y.Z where X,Y,Z are non-negative integers"
      
    - id: author_present
      name: "Author Information"
      points: 8
      description: "Author field contains valid identifier"
      criteria: "Non-empty string with contact or identifier"
      
    - id: commands_structure
      name: "Commands Structure Valid"
      points: 10
      description: "Commands section is properly structured"
      criteria: "Commands is a list or dictionary with valid entries"
      
    - id: no_duplicate_keys
      name: "No Duplicate Keys"
      points: 8
      description: "YAML contains no duplicate keys at any level"
      criteria: "All keys are unique within their scope"
      
    - id: valid_references
      name: "Valid Internal References"
      points: 10
      description: "All internal references point to existing sections"
      criteria: "No broken references or missing dependencies"
      
    - id: encoding_utf8
      name: "UTF-8 Encoding"
      points: 10
      description: "File is properly UTF-8 encoded"
      criteria: "No encoding errors, valid Unicode"
      
    - id: no_trailing_whitespace
      name: "No Trailing Whitespace"
      points: 5
      description: "Lines do not end with whitespace characters"
      criteria: "All lines end cleanly without trailing spaces/tabs"
      
    - id: indentation_consistent
      name: "Consistent Indentation"
      points: 5
      description: "Uses consistent indentation (spaces preferred)"
      criteria: "2 or 4 spaces, no mixed tabs/spaces"

# ============================================================================
# PHASE 2: TEXT QUALITY (300 points)
# Evaluates semantic quality of skill content across 6 dimensions
# ============================================================================
phase_2_text_quality:
  total_points: 300
  description: "Evaluate semantic quality of skill content"
  
  dimensions:
    - id: clarity
      name: "Clarity"
      points: 50
      description: "Instructions are clear, unambiguous, and easy to understand"
      scoring_criteria:
        excellent: 45-50
        good: 35-44
        acceptable: 25-34
        poor: 15-24
        failed: 0-14
      indicators:
        - "Uses precise language without jargon overload"
        - "Step-by-step instructions are logical"
        - "Examples are clear and relevant"
        - "Avoids ambiguous pronouns or references"
        
    - id: completeness
      name: "Completeness"
      points: 50
      description: "All necessary information is present for successful execution"
      scoring_criteria:
        excellent: 45-50
        good: 35-44
        acceptable: 25-34
        poor: 15-24
        failed: 0-14
      indicators:
        - "Prerequisites are listed"
        - "All steps are documented"
        - "Error handling is addressed"
        - "Edge cases are considered"
        
    - id: accuracy
      name: "Accuracy"
      points: 60
      description: "Technical information is correct and up-to-date"
      scoring_criteria:
        excellent: 55-60
        good: 42-54
        acceptable: 30-41
        poor: 18-29
        failed: 0-17
      indicators:
        - "Commands work as documented"
        - "File paths are correct"
        - "API references are accurate"
        - "Version requirements are correct"
        
    - id: safety
      name: "Safety"
      points: 60
      description: "Skill does not encourage harmful or destructive actions"
      scoring_criteria:
        excellent: 55-60
        good: 42-54
        acceptable: 30-41
        poor: 18-29
        failed: 0-17
      indicators:
        - "No rm -rf / or equivalent dangerous commands"
        - "Validates inputs before execution"
        - "Warns about destructive operations"
        - "Uses sandboxing where appropriate"
        
    - id: maintainability
      name: "Maintainability"
      points: 40
      description: "Skill is structured for easy updates and debugging"
      scoring_criteria:
        excellent: 36-40
        good: 28-35
        acceptable: 20-27
        poor: 12-19
        failed: 0-11
      indicators:
        - "Modular design with clear separation"
        - "Comments explain non-obvious logic"
        - "Configuration is externalized"
        - "Version information is clear"
        
    - id: usability
      name: "Usability"
      points: 40
      description: "Skill is user-friendly and accessible"
      scoring_criteria:
        excellent: 36-40
        good: 28-35
        acceptable: 20-27
        poor: 12-19
        failed: 0-11
      indicators:
        - "Progress indicators for long operations"
        - "Helpful error messages"
        - "Consistent naming conventions"
        - "Appropriate abstraction level"

# ============================================================================
# PHASE 3: RUNTIME TESTING (400 points)
# Executes skill in isolated environment and validates behavior
# ============================================================================
phase_3_runtime_testing:
  total_points: 400
  description: "Execute skill in isolated environment and validate behavior"
  
  test_categories:
    - id: unit_tests
      name: "Unit Tests"
      points: 80
      description: "Individual components function correctly in isolation"
      tests:
        - name: "Command parsing"
          points: 20
        - name: "Argument validation"
          points: 20
        - name: "Configuration loading"
          points: 20
        - name: "Error handling paths"
          points: 20
          
    - id: integration_tests
      name: "Integration Tests"
      points: 80
      description: "Components work together correctly"
      tests:
        - name: "Command chain execution"
          points: 25
        - name: "Data flow between components"
          points: 25
        - name: "External dependency integration"
          points: 30
          
    - id: sandbox_tests
      name: "Sandbox Environment Tests"
      points: 80
      description: "Skill operates correctly within sandbox constraints"
      tests:
        - name: "File system isolation"
          points: 25
        - name: "Network restrictions"
          points: 25
        - name: "Resource limits respected"
          points: 30
          
    - id: error_handling
      name: "Error Handling"
      points: 60
      description: "Skill gracefully handles error conditions"
      tests:
        - name: "Invalid input handling"
          points: 20
        - name: "Missing dependency handling"
          points: 20
        - name: "Timeout and resource exhaustion"
          points: 20
          
    - id: performance_tests
      name: "Performance Tests"
      points: 60
      description: "Skill meets performance requirements"
      tests:
        - name: "Startup time < 5 seconds"
          points: 20
        - name: "Memory usage < 512MB"
          points: 20
        - name: "Execution time within limits"
          points: 20
          
    - id: security_tests
      name: "Security Tests"
      points: 40
      description: "Skill passes security validation"
      tests:
        - name: "No privilege escalation"
          points: 15
        - name: "Input sanitization"
          points: 15
        - name: "No hardcoded secrets"
          points: 10

# ============================================================================
# PHASE 4: CERTIFICATION (200 points)
# Final validation and documentation completeness
# ============================================================================
phase_4_certification:
  total_points: 200
  description: "Final validation and documentation completeness"
  
  components:
    - id: documentation_complete
      name: "Documentation Complete"
      points: 50
      description: "All required documentation is present and accurate"
      requirements:
        - "README.md with usage examples"
        - "API documentation if applicable"
        - "Changelog or version history"
        - "Troubleshooting guide"
      
    - id: test_coverage
      name: "Test Coverage"
      points: 40
      description: "Adequate test coverage across codebase"
      thresholds:
        excellent: "≥ 90% coverage"
        good: "80-89% coverage"
        acceptable: "70-79% coverage"
        insufficient: "< 70% coverage"
      
    - id: code_quality
      name: "Code Quality"
      points: 40
      description: "Code follows best practices and style guidelines"
      checks:
        - "Passes linting (pylint, eslint, etc.)"
        - "No code smells or anti-patterns"
        - "Consistent formatting"
        - "Proper error handling"
      
    - id: compatibility
      name: "Compatibility"
      points: 40
      description: "Skill works across supported environments"
      requirements:
        - "Tested on minimum supported versions"
        - "Cross-platform compatibility verified"
        - "Dependency versions specified"
        - "No hardcoded platform-specific paths"
      
    - id: review_approval
      name: "Review Approval"
      points: 30
      description: "Manual review by certified evaluator"
      criteria:
        - "Code review completed"
        - "Security review passed"
        - "Documentation review passed"
        - "Final sign-off obtained"

# ============================================================================
# CERTIFICATION TIERS
# Defines the quality levels for skill certification
# ============================================================================
certification_tiers:
  - tier: bronze
    name: "Bronze"
    description: "Basic functionality verified"
    requirements:
      min_score: 600
      max_variance: 150
      phase_requirements:
        phase_1: 70    # 70/100 minimum
        phase_2: 180   # 180/300 minimum
        phase_3: 240   # 240/400 minimum
        phase_4: 110   # 110/200 minimum
      
  - tier: silver
    name: "Silver"
    description: "Good quality with solid documentation"
    requirements:
      min_score: 750
      max_variance: 100
      phase_requirements:
        phase_1: 85    # 85/100 minimum
        phase_2: 225   # 225/300 minimum
        phase_3: 300   # 300/400 minimum
        phase_4: 140   # 140/200 minimum
      
  - tier: gold
    name: "Gold"
    description: "High quality with comprehensive testing"
    requirements:
      min_score: 850
      max_variance: 75
      phase_requirements:
        phase_1: 90    # 90/100 minimum
        phase_2: 255   # 255/300 minimum
        phase_3: 340   # 340/400 minimum
        phase_4: 165   # 165/200 minimum
      
  - tier: platinum
    name: "Platinum"
    description: "Excellence in all dimensions"
    requirements:
      min_score: 950
      max_variance: 50
      phase_requirements:
        phase_1: 95    # 95/100 minimum
        phase_2: 285   # 285/300 minimum
        phase_3: 380   # 380/400 minimum
        phase_4: 190   # 190/200 minimum

# ============================================================================
# VARIANCE FORMULA
# Measures consistency across evaluation dimensions
# ============================================================================
variance_formula:
  description: "Calculate score variance across phases to ensure balanced quality"
  formula: |
    variance = sqrt(sum((phase_score - mean_score)²) / n)
    
    Where:
    - phase_score = (actual_score / max_score) * 100 for each phase
    - mean_score = average of all normalized phase scores
    - n = number of phases (4)
  
  calculation_steps:
    - "Normalize each phase score to 0-100 scale"
    - "Calculate mean of normalized scores"
    - "Compute squared difference from mean for each phase"
    - "Average the squared differences"
    - "Take square root to get standard deviation"
  
  interpretation:
    low_variance: "< 50 - Well-balanced skill across all dimensions"
    medium_variance: "50-100 - Some imbalance, acceptable for lower tiers"
    high_variance: "> 100 - Significant imbalance, requires improvement"
  
  example: |
    Phase scores: P1=90, P2=85, P3=88, P4=92 (all out of 100 normalized)
    Mean = (90 + 85 + 88 + 92) / 4 = 88.75
    Variance = sqrt(((90-88.75)² + (85-88.75)² + (88-88.75)² + (92-88.75)²) / 4)
             = sqrt((1.56 + 14.06 + 0.56 + 10.56) / 4)
             = sqrt(26.74 / 4)
             = sqrt(6.685)
             = 2.59 (very low variance - excellent balance)

# ============================================================================
# SCORING SUMMARY
# ============================================================================
scoring_summary:
  total_possible_points: 1000
  
  phase_breakdown:
    - phase: 1
      name: "Parse & Validate"
      points: 100
      percentage: 10%
      
    - phase: 2
      name: "Text Quality"
      points: 300
      percentage: 30%
      
    - phase: 3
      name: "Runtime Testing"
      points: 400
      percentage: 40%
      
    - phase: 4
      name: "Certification"
      points: 200
      percentage: 20%
  
  passing_thresholds:
    minimum_total: 600
    no_single_phase_below: 50%
    max_variance_by_tier:
      bronze: 150
      silver: 100
      gold: 75
      platinum: 50
